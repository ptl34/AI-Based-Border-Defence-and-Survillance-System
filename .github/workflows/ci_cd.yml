name: CI / CD — Border Surveillance AI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── 1. Lint & Test ──────────────────────────────────────────────────────────
  test:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          # Fail on syntax errors or undefined names; warn on style
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ tests/ --count --max-line-length=100 --statistics

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

  # ── 2. Deploy Azure Function (main branch only) ────────────────────────────
  deploy-function:
    name: Deploy to Azure Functions
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Azure Functions dependencies
        run: |
          pip install azure-functions azure-cosmos

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name:        border-surveillance-fn
          package:         azure/functions/
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
